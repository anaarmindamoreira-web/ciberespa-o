<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Ciberespaço: Fundamentos e Cultura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        const scenariosData = [
            {
                id: 1,
                title: "Explorando o Ciberespaço",
                context: "Ao explicar aos teus alunos o que é o ciberespaço, um deles pergunta se é apenas o 'sítio onde vive a Internet'.",
                dilema: "Qual a definição mais completa que deves transmitir?",
                options: [
                    { level: 1, text: "Sim, é basicamente o conjunto de cabos e computadores que ligam o mundo.", feedback: "Nível 1: Visão Redutora. O ciberespaço é muito mais do que a infraestrutura física.", points: 2 },
                    { level: 2, text: "É o conjunto de todos os websites e redes sociais que podemos visitar.", feedback: "Nível 2: Foco no Conteúdo. Esqueceste a interação entre dados, sistemas e pessoas.", points: 4 },
                    { level: 3, text: "É o domínio digital onde a informação circula e onde as pessoas interagem.", feedback: "Nível 3: Utilizador Atento. Estás perto, mas falta a componente da interligação global.", points: 6 },
                    { level: 4, text: "É o ambiente virtual criado pela interligação de sistemas, dados, infraestruturas e pessoas.", feedback: "Nível 4: Defensor Ativo. Uma definição robusta que engloba a complexidade do meio.", points: 8 },
                    { level: 5, text: "É um domínio global, dinâmico e abstrato, onde a interação humana e técnica molda a sociedade moderna.", feedback: "Nível 5: Mestre da Cibersegurança. Compreendes a profundidade social e técnica do ciberespaço.", points: 10 }
                ]
            },
            {
                id: 2,
                title: "Confidencialidade em Xeque",
                context: "Encontras uma lista de passwords de alunos esquecida na impressora da sala de professores.",
                dilema: "Este incidente atenta contra qual pilar da segurança?",
                options: [
                    { level: 1, text: "Não atenta contra nada, desde que ninguém as use para fazer mal.", feedback: "Nível 1: Negligência. A exposição da informação por si só já é um incidente grave.", points: 2 },
                    { level: 2, text: "Atenta contra a Disponibilidade, pois os alunos podem ficar sem acesso.", feedback: "Nível 2: Erro de Conceito. O foco aqui é o acesso não autorizado à leitura dos dados.", points: 4 },
                    { level: 3, text: "Atenta contra a Integridade, porque as passwords podem ser mudadas.", feedback: "Nível 3: Visão Parcial. A mudança é integridade, mas a leitura indevida é confidencialidade.", points: 6 },
                    { level: 4, text: "Atenta contra a Confidencialidade, pois dados privados foram expostos.", feedback: "Nível 4: Defensor Ativo. Identificaste corretamente a quebra do segredo da informação.", points: 8 },
                    { level: 5, text: "Confidencialidade. Deves reportar o incidente e destruir a lista de forma segura imediatamente.", feedback: "Nível 5: Mestre da Cibersegurança. Identificaste o pilar e tomaste a ação corretiva ética.", points: 10 }
                ]
            },
            {
                id: 3,
                title: "Ataque à Integridade",
                context: "Percebes que alguém alterou as faltas de um aluno no sistema sem autorização, embora o sistema continue a funcionar bem.",
                dilema: "Qual pilar foi comprometido e como classificas a situação?",
                options: [
                    { level: 1, text: "O sistema está lento, logo é um problema de hardware.", feedback: "Nível 1: Desorientação Técnica. Ignoraste a alteração maliciosa dos dados.", points: 2 },
                    { level: 2, text: "Houve uma quebra de disponibilidade, pois os dados corretos 'desapareceram'.", feedback: "Nível 2: Erro de Pilar. Os dados estão lá, mas estão errados (corrompidos).", points: 4 },
                    { level: 3, text: "É uma falha de confidencialidade porque alguém viu as faltas.", feedback: "Nível 3: Foco Errado. O problema principal é a modificação dos dados, não apenas o acesso.", points: 6 },
                    { level: 4, text: "É um ataque à Integridade, pois a fidedignidade da informação foi alterada.", feedback: "Nível 4: Defensor Ativo. Percebeste que a verdade dos dados foi comprometida.", points: 8 },
                    { level: 5, text: "Integridade. A fidedignidade foi violada. É necessário restaurar o backup e investigar o acesso.", feedback: "Nível 5: Mestre da Cibersegurança. Focaste na recuperação e na integridade total do sistema.", points: 10 }
                ]
            },
            {
                id: 4,
                title: "Sistemas em Baixo (Disponibilidade)",
                context: "Na manhã de lançamento das notas, o servidor da escola vai abaixo devido a um número excessivo de acessos simultâneos (DoS).",
                dilema: "Que pilar da tríade CID está em sofrimento?",
                options: [
                    { level: 1, text: "A Internet da escola é fraca, não é um problema de segurança.", feedback: "Nível 1: Visão Limitada. A interrupção de serviço é um dos maiores riscos de segurança.", points: 2 },
                    { level: 2, text: "Integridade, porque as notas podem ficar gravadas a meio.", feedback: "Nível 2: Confusão de Pilares. O problema atual é o acesso ao serviço, não o conteúdo.", points: 4 },
                    { level: 3, text: "Confidencialidade, porque os hackers podem estar a entrar agora.", feedback: "Nível 3: Suposição. Podes ter razão, mas o efeito visível é a falta de acesso.", points: 6 },
                    { level: 4, text: "Disponibilidade, pois o serviço não está acessível a quem dele necessita.", feedback: "Nível 4: Defensor Ativo. Identificaste o pilar que garante que o sistema está pronto a usar.", points: 8 },
                    { level: 5, text: "Disponibilidade. É necessário um plano de continuidade de negócio para evitar estas paragens.", feedback: "Nível 5: Mestre da Cibersegurança. Pensaste na resiliência e na continuidade do serviço escolar.", points: 10 }
                ]
            },
            {
                id: 5,
                title: "Vulnerabilidade vs Ameaça",
                context: "Descobres que o Windows de um computador da biblioteca não é atualizado há 2 anos.",
                dilema: "Como classificas tecnicamente esta situação?",
                options: [
                    { level: 1, text: "É um vírus que já está a atacar o computador.", feedback: "Nível 1: Alarme Falso. Confundiste uma falha de manutenção com um ataque ativo.", points: 2 },
                    { level: 2, text: "É uma ameaça constante à escola.", feedback: "Nível 2: Erro de Termo. A ameaça é externa; a falta de atualização é uma falha interna.", points: 4 },
                    { level: 3, text: "Não é nada, se o computador funcionar bem não há perigo.", feedback: "Nível 3: Complacência. Portas abertas atraem intrusos, mesmo que ainda não tenham entrado.", points: 6 },
                    { level: 4, text: "É uma vulnerabilidade (uma fraqueza) que pode ser explorada por uma ameaça.", feedback: "Nível 4: Defensor Ativo. Distinguiste corretamente a brecha técnica do perigo externo.", points: 8 },
                    { level: 5, text: "Vulnerabilidade crítica. Deve-se isolar o PC da rede e atualizar imediatamente o software.", feedback: "Nível 5: Mestre da Cibersegurança. Identificaste a falha e a solução de mitigação imediata.", points: 10 }
                ]
            },
            {
                id: 6,
                title: "O Isqueiro Digital (Phishing)",
                context: "Recebes uma mensagem: 'Olá colega, vê este vídeo da nossa última reunião!' com um link estranho. Tu não estiveste em nenhuma reunião ontem.",
                dilema: "Qual é a tua análise desta situação de Engenharia Social?",
                options: [
                    { level: 1, text: "Clico no vídeo, pode ser que tenham falado de mim e quero saber.", feedback: "Nível 1: Curiosidade Fatal. Cedeste ao gatilho emocional da curiosidade.", points: 2 },
                    { level: 2, text: "Respondo a dizer que não estive lá e pergunto quem enviou.", feedback: "Nível 2: Interação Inútil. Ao responder, confirmas que a tua conta está ativa para o atacante.", points: 4 },
                    { level: 3, text: "Ignoro apenas, pois não me interessa o que disseram na reunião.", feedback: "Nível 3: Proteção Passiva. Estás seguro, mas o 'colega' continua a espalhar o vírus.", points: 6 },
                    { level: 4, text: "Suspeito de Phishing por causa do contexto errado e reporto o e-mail.", feedback: "Nível 4: Defensor Ativo. Usaste o pensamento crítico para detetar a fraude.", points: 8 },
                    { level: 5, text: "Analiso o link (sem clicar), aviso o colega por outro meio e alerto a TI sobre a campanha de phishing.", feedback: "Nível 5: Mestre da Cibersegurança. Protegeste-te e iniciaste a defesa coletiva.", points: 10 }
                ]
            },
            {
                id: 7,
                title: "Cultura de Cibersegurança",
                context: "A direção da escola quer comprar o firewall mais caro do mundo, mas não quer perder tempo a dar formação aos professores.",
                dilema: "Qual é o erro nesta estratégia de Cultura de Cibersegurança?",
                options: [
                    { level: 1, text: "Nenhum, a tecnologia resolve todos os problemas de segurança automaticamente.", feedback: "Nível 1: Tecnocentrismo. A tecnologia sem utilizadores formados é inútil.", points: 2 },
                    { level: 2, text: "O erro é o preço, deviam comprar um mais barato e poupar dinheiro.", feedback: "Nível 2: Foco Financeiro. O problema não é o custo, é a eficácia do sistema humano.", points: 4 },
                    { level: 3, text: "Deviam focar-se apenas nos alunos, os professores já sabem o que fazem.", feedback: "Nível 3: Exclusão de Grupo. A segurança é uma responsabilidade de todos os membros.", points: 6 },
                    { level: 4, text: "Esqueceram-se que o ser humano é o 'elo mais fraco' e precisa de literacia digital.", feedback: "Nível 4: Defensor Ativo. Reconheces que a cultura depende de pessoas, não apenas de máquinas.", points: 8 },
                    { level: 5, text: "A segurança é 80% comportamento. Sem formação, a tecnologia mais cara falhará no primeiro erro humano.", feedback: "Nível 5: Mestre da Cibersegurança. Compreendes o equilíbrio vital entre tecnologia, processos e pessoas.", points: 10 }
                ]
            },
            {
                id: 8,
                title: "Engenharia Social no Telefone",
                context: "Alguém liga para a secretaria da escola dizendo ser da 'Assistência Técnica Microsoft' e que precisa de acesso remoto ao PC para 'limpar um vírus'.",
                dilema: "Como reages a este pedido inesperado?",
                options: [
                    { level: 1, text: "Dou acesso imediato, não quero que o computador da escola espalhe vírus.", feedback: "Nível 1: Vítima de Vishing. Entregaste o controlo total do sistema a um desconhecido.", points: 2 },
                    { level: 2, text: "Peço para ligarem mais tarde quando o informático da escola estiver presente.", feedback: "Nível 2: Adiar o Perigo. Não cortaste a comunicação com o burlão.", points: 4 },
                    { level: 3, text: "Digo que não tenho tempo e desligo sem dizer mais nada.", feedback: "Nível 3: Reação Brusca. Evitaste o ataque, mas não validaste a fraude.", points: 6 },
                    { level: 4, text: "Desconfio, pois a Microsoft não liga para utilizadores, e informo que vou validar com a minha TI.", feedback: "Nível 4: Defensor Ativo. Reconheces um padrão clássico de fraude telefónica.", points: 8 },
                    { level: 5, text: "Identifico como Vishing, desligo, e alerto todos os colegas para não aceitarem chamadas de suporte não solicitadas.", feedback: "Nível 5: Mestre da Cibersegurança. Agiste preventivamente para toda a organização.", points: 10 }
                ]
            },
            {
                id: 9,
                title: "Ética e Direito no Ciberespaço",
                context: "Um aluno descobre a password de um colega e entra na sua conta para ler mensagens privadas, mas não apaga nem altera nada.",
                dilema: "Isto é considerado um crime ou apenas uma brincadeira?",
                options: [
                    { level: 1, text: "É apenas uma brincadeira, se ele não estragou nada não há problema.", feedback: "Nível 1: Amoralidade Digital. O acesso não autorizado é, por si só, uma violação ética e legal.", points: 2 },
                    { level: 2, text: "É mal educado, mas só é crime se ele publicar as mensagens na internet.", feedback: "Nível 2: Desconhecimento da Lei. O crime de acesso ilegítimo ocorre no momento da entrada.", points: 4 },
                    { level: 3, text: "É um problema de privacidade que a escola deve resolver com um castigo interno.", feedback: "Nível 3: Visão Disciplinar. É correto, mas ignora a dimensão legal do ato.", points: 6 },
                    { level: 4, text: "É um Acesso Ilegítimo, previsto na Lei do Cibercrime, independentemente de haver dano.", feedback: "Nível 4: Defensor Ativo. Identificaste a moldura legal correta para o comportamento.", points: 8 },
                    { level: 5, text: "Violação de privacidade e crime de acesso ilegítimo. Requer intervenção pedagógica e consciência legal.", feedback: "Nível 5: Mestre da Cibersegurança. Uniste a educação ética ao conhecimento do direito digital.", points: 10 }
                ]
            },
            {
                id: 10,
                title: "O Elo Humano",
                context: "Um colega diz: 'Eu não preciso de me preocupar com cibersegurança porque não sou importante nem tenho segredos'.",
                dilema: "Qual é o contra-argumento mais forte sobre o papel do indivíduo?",
                options: [
                    { level: 1, text: "Tens razão, se não tens nada a esconder os hackers não te querem atacar.", feedback: "Nível 1: Falsa Segurança. Todos os utilizadores têm valor para um atacante.", points: 2 },
                    { level: 2, text: "Devias ter cuidado porque eles podem roubar as tuas fotos de família.", feedback: "Nível 2: Foco Pessoal. Esqueceste o impacto que ele tem na rede da escola.", points: 4 },
                    { level: 3, text: "Toda a gente é importante porque os computadores hoje em dia são caros.", feedback: "Nível 3: Foco no Hardware. A segurança foca-se na informação e nos acessos.", points: 6 },
                    { level: 4, text: "Tu és uma porta de entrada para a rede da escola; se fores atacado, todos corremos risco.", feedback: "Nível 4: Defensor Ativo. Entendeste o conceito de responsabilidade partilhada.", points: 8 },
                    { level: 5, text: "Cibersegurança é um dever cívico digital. O teu dispositivo pode ser usado para atacar outros se for comprometido.", feedback: "Nível 5: Mestre da Cibersegurança. Vês o utilizador como parte de um ecossistema global de defesa.", points: 10 }
                ]
            }
        ];

        const App = () => {
            const [gameState, setGameState] = useState('intro');
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [lastFeedback, setLastFeedback] = useState(null);

            const shuffledScenarios = useMemo(() => {
                return scenariosData.map(s => ({
                    ...s,
                    options: shuffleArray(s.options)
                }));
            }, [gameState === 'intro']);

            const getLevelDetails = (totalScore) => {
                const avg = totalScore / scenariosData.length;
                if (avg >= 9) return {
                    level: 5, label: "Arquiteto da Cultura", color: "text-purple-700", bg: "bg-purple-50", border: "border-purple-300",
                    profile: "Domínio total dos conceitos do Módulo 1. Compreendes o ciberespaço como um ecossistema complexo e assumes a cibersegurança como uma cultura viva e ética.",
                    strengths: ["Tríade CID", "Diferença Vulnerabilidade/Ameaça", "Consciência Legal", "Engenharia Social"],
                    actionPlan: "Parabéns! Estás pronto para ser um multiplicador de cultura na tua escola. O teu conhecimento teórico é sólido e consegues aplicá-lo em decisões éticas e técnicas."
                };
                if (avg >= 7) return {
                    level: 4, label: "Sentinela Digital", color: "text-blue-700", bg: "bg-blue-50", border: "border-blue-200",
                    profile: "Conhecimento robusto. Identificas bem os pilares da segurança e não te deixas enganar facilmente por táticas de manipulação psicológica.",
                    strengths: ["Identificação de Pilares", "Ceticismo Saudável"],
                    actionPlan: "Muito bom. Refina o teu conhecimento sobre a moldura legal (Lei do Cibercrime) para poderes orientar melhor os teus alunos em questões de ética digital."
                };
                return {
                    level: 2, label: "Explorador Iniciante", color: "text-amber-700", bg: "bg-amber-50", border: "border-amber-200",
                    profile: "Ainda confundes alguns pilares da segurança e tens uma visão muito focada na tecnologia, esquecendo o fator humano.",
                    strengths: ["Interesse na Matéria"],
                    actionPlan: "Revisita os conceitos da Tríade CID (Confidencialidade, Integridade, Disponibilidade). Lembra-te: a segurança começa nas pessoas, não nos cabos."
                };
            };

            const handleDecision = (option) => {
                setLastFeedback({ message: option.feedback, level: option.level, points: option.points });
                setScore(prev => prev + option.points);
                setGameState('feedback');
            };

            return (
                <div className="min-h-screen p-4 flex flex-col items-center justify-center">
                    <div className="max-w-4xl w-full bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden flex flex-col min-h-[700px] relative animate-fade-in">
                        
                        <div className="bg-[#1e293b] p-6 text-white flex justify-between items-center border-b-4 border-purple-500">
                            <div className="flex items-center gap-4">
                                <div className="p-2 bg-purple-500 rounded-xl shadow-lg"><Icon name="globe" size={32} /></div>
                                <h1 className="text-xl font-black uppercase tracking-tight">Missão 1: Ciberespaço e Cultura</h1>
                            </div>
                            {gameState !== 'intro' && gameState !== 'final' && (
                                <div className="bg-slate-800 px-4 py-1.5 rounded-xl border border-slate-700 shadow-inner">
                                    <div className="text-[9px] uppercase text-purple-400 font-bold mb-1">Score</div>
                                    <div className="text-xl font-mono font-bold">{score}</div>
                                </div>
                            )}
                        </div>

                        <div className="p-8 flex-grow flex flex-col">
                            {gameState === 'intro' && (
                                <div className="flex-grow flex flex-col items-center justify-center space-y-8 text-center animate-fade-in">
                                    <div className="p-10 bg-purple-50 rounded-full border-2 border-purple-100"><Icon name="book-open" size={100} className="text-purple-600" /></div>
                                    <div className="space-y-4 max-w-2xl">
                                        <h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">O Início da Cultura</h2>
                                        <p className="text-slate-500 text-lg">Testa os teus conhecimentos sobre os pilares da segurança e o domínio digital no primeiro módulo do curso.</p>
                                    </div>
                                    <button onClick={() => { setScore(0); setCurrentIdx(0); setGameState('scenario'); }} className="px-12 py-5 bg-purple-600 hover:bg-purple-700 text-white rounded-[2rem] font-black text-xl shadow-xl transition-all active:scale-95 flex items-center gap-4">
                                        Entrar no Ciberespaço <Icon name="zap" size={24} />
                                    </button>
                                </div>
                            )}

                            {gameState === 'scenario' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-full text-[10px] font-black uppercase w-fit">
                                        Fase {currentIdx + 1} de {shuffledScenarios.length}
                                    </div>
                                    <h2 className="text-3xl font-black text-slate-800 leading-tight border-l-[10px] border-purple-500 pl-6">{shuffledScenarios[currentIdx].title}</h2>
                                    <div className="p-6 bg-slate-50 rounded-[2rem] border-2 border-slate-100 text-slate-600 italic text-lg shadow-inner">
                                        "{shuffledScenarios[currentIdx].context}"
                                    </div>
                                    <p className="font-bold text-slate-900 text-xl leading-tight pl-2">{shuffledScenarios[currentIdx].dilema}</p>
                                    <div className="grid gap-3 pt-2">
                                        {shuffledScenarios[currentIdx].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleDecision(opt)} className="w-full p-4 text-left border-2 border-slate-100 hover:border-purple-500 hover:bg-purple-50 rounded-[1.2rem] transition-all flex items-start gap-4 group">
                                                <div className="h-8 w-8 rounded-lg bg-slate-100 text-slate-400 font-black flex items-center justify-center group-hover:bg-purple-600 group-hover:text-white shrink-0">{i + 1}</div>
                                                <span className="text-slate-700 font-semibold pt-0.5">{opt.text}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {gameState === 'feedback' && lastFeedback && (
                                <div className="flex-grow flex flex-col items-center justify-center space-y-8 text-center animate-fade-in max-w-2xl mx-auto">
                                    <div className={`p-8 rounded-full shadow-xl ${lastFeedback.level >= 4 ? 'bg-green-100 text-green-600' : 'bg-amber-100 text-amber-600'}`}>
                                        <Icon name={lastFeedback.level >= 4 ? "check-circle" : "alert-circle"} size={80} />
                                    </div>
                                    <div className="bg-slate-900 text-purple-300 p-8 rounded-[2.5rem] shadow-2xl italic text-xl font-semibold border-b-8 border-purple-500">
                                        "{lastFeedback.message}"
                                    </div>
                                    <button onClick={() => currentIdx < shuffledScenarios.length - 1 ? (setCurrentIdx(c => c+1), setGameState('scenario')) : setGameState('final')} className="px-12 py-5 bg-slate-900 text-white rounded-[2rem] font-black text-lg flex items-center gap-3">
                                        Continuar Missão <Icon name="chevron-right" size={24} />
                                    </button>
                                </div>
                            )}

                            {gameState === 'final' && (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="text-center">
                                        <h2 className="text-4xl font-black text-slate-800 uppercase tracking-tighter">Certificado de Cultura Digital</h2>
                                    </div>
                                    {(() => {
                                        const info = getLevelDetails(score);
                                        return (
                                            <div className={`p-8 rounded-[3rem] border-4 ${info.bg} ${info.border} space-y-6 shadow-xl`}>
                                                <div className="flex items-center justify-between border-b pb-6 border-slate-200">
                                                    <div className="flex items-center gap-6">
                                                        <div className={`h-24 w-24 rounded-3xl bg-white border-4 ${info.color.replace('text-', 'border-')} flex items-center justify-center text-5xl font-black shadow-lg`}>{info.level}</div>
                                                        <div>
                                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nível de Maturidade</p>
                                                            <h4 className={`text-3xl font-black ${info.color}`}>{info.label}</h4>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-900 px-8 py-4 rounded-2xl text-center shadow-lg border-b-4 border-purple-500">
                                                        <p className="text-[10px] text-purple-400 font-black">PONTOS</p>
                                                        <p className="text-4xl font-black text-white">{score}</p>
                                                    </div>
                                                </div>
                                                <div className="grid md:grid-cols-2 gap-8">
                                                    <div className="space-y-4">
                                                        <h5 className="font-black text-slate-800 flex items-center gap-2"><Icon name="user" /> Perfil Analítico</h5>
                                                        <p className="bg-white/80 p-5 rounded-2xl border border-slate-100 text-slate-700 font-medium italic">{info.profile}</p>
                                                    </div>
                                                    <div className="space-y-4">
                                                        <h5 className="font-black text-slate-800 flex items-center gap-2"><Icon name="trending-up" /> Próximos Passos</h5>
                                                        <p className="bg-purple-900 text-purple-50 p-5 rounded-2xl font-medium shadow-lg">{info.actionPlan}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                    <div className="flex justify-center"><button onClick={() => setGameState('intro')} className="px-10 py-4 border-2 border-slate-200 rounded-full font-black text-slate-400 text-xs tracking-widest uppercase hover:bg-slate-100 transition-all">Refazer Diagnóstico</button></div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
